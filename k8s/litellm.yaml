apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: ope
data:
  config.yaml: |
    model_list:
      - model_name: openai-main
        litellm_params:
          model: openai/gpt-5.5
          api_key: os.environ/OPENAI_API_KEY
      - model_name: openai-mini
        litellm_params:
          model: openai/gpt-5.5-mini
          api_key: os.environ/OPENAI_API_KEY
      - model_name: openai-coding
        litellm_params:
          model: openai/gpt-5.5-codex
          api_key: os.environ/OPENAI_API_KEY

      - model_name: claude-main
        litellm_params:
          model: anthropic/claude-sonnet-4-20250514
          api_key: os.environ/ANTHROPIC_API_KEY
      - model_name: claude-coding
        litellm_params:
          model: anthropic/claude-sonnet-4-20250514
          api_key: os.environ/ANTHROPIC_API_KEY

      - model_name: gemini-main
        litellm_params:
          model: gemini/gemini-2.5-pro
          api_key: os.environ/GEMINI_API_KEY
      - model_name: gemini-fast
        litellm_params:
          model: gemini/gemini-2.5-flash
          api_key: os.environ/GEMINI_API_KEY

      - model_name: mistral-large
        litellm_params:
          model: mistral/mistral-large-latest
          api_key: os.environ/MISTRAL_API_KEY
      - model_name: mistral-fast
        litellm_params:
          model: mistral/mistral-small-latest
          api_key: os.environ/MISTRAL_API_KEY

    router_settings:
      fallbacks:
        - openai-main:
            - claude-main
            - gemini-main
            - mistral-large
        - openai-mini:
            - gemini-fast
            - mistral-fast
        - openai-coding:
            - claude-coding
            - gemini-main
        - claude-coding:
            - openai-coding
            - gemini-main
        - mistral-fast:
            - gemini-fast
            - openai-mini

    litellm_settings:
      num_retries: 1
      request_timeout: 120
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: ope
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-latest
          args: ["--config", "/app/config.yaml", "--host", "0.0.0.0", "--port", "4000"]
          envFrom:
            - secretRef:
                name: ope-provider-env
          ports:
            - containerPort: 4000
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: litellm-config
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: ope
spec:
  selector:
    app: litellm
  ports:
    - name: http
      port: 4000
      targetPort: 4000
