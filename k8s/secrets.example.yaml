apiVersion: v1
kind: Secret
metadata:
  name: ope-db
  namespace: ope
type: Opaque
stringData:
  postgres-password: replace-with-generated-password
  postgres-dsn: postgresql://ope:replace-with-generated-password@postgres.ope.svc.cluster.local:5432/ope
---
apiVersion: v1
kind: Secret
metadata:
  name: ope-provider-env
  namespace: ope
type: Opaque
stringData:
  OPENAI_API_KEY: replace-with-openai-key
  ANTHROPIC_API_KEY: replace-with-anthropic-key
  GEMINI_API_KEY: replace-with-gemini-key
  MISTRAL_API_KEY: replace-with-mistral-key
  LITELLM_MASTER_KEY: replace-with-router-key
---
apiVersion: v1
kind: Secret
metadata:
  name: ope-api
  namespace: ope
type: Opaque
stringData:
  api-keys: replace-with-comma-separated-api-keys
