apiVersion: apps/v1
kind: Deployment
metadata:
  name: ope-core
  namespace: ope
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ope-core
  template:
    metadata:
      labels:
        app: ope-core
    spec:
      securityContext:
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: postgres
              topologyKey: kubernetes.io/hostname
      containers:
        - name: ope-core
          image: ghcr.io/dronewukong/ope-core:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: OPE_ENV
              value: octoputer
            - name: OPE_SERVICE_NAME
              value: ope-core
            - name: OPE_DEFAULT_PROJECT
              value: ope-core
            - name: OPE_RUN_MIGRATIONS_ON_STARTUP
              value: "false"
            # Do not block the HTTP server from starting on external services.
            # /health and / stay reachable; /ready still reports postgres/redis state.
            - name: OPE_SKIP_EXTERNAL_INIT
              value: "true"
            - name: OPE_REQUIRE_API_KEY
              value: "true"
            - name: OPE_UPLOAD_ROOT
              value: /data/ope/uploads
            - name: OPE_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: ope-api
                  key: api-keys
            - name: REQUEST_TIMEOUT_SECONDS
              value: "30"
            - name: LITELLM_BASE_URL
              value: http://litellm.ope.svc.cluster.local:4000
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ope-provider-env
                  key: LITELLM_MASTER_KEY
                  optional: true
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ope-provider-env
                  key: GITHUB_TOKEN
                  optional: true
            - name: GOOGLE_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ope-provider-env
                  key: GOOGLE_ACCESS_TOKEN
                  optional: true
            - name: GMAIL_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ope-provider-env
                  key: GMAIL_ACCESS_TOKEN
                  optional: true
            - name: GOOGLE_DRIVE_ENABLED
              value: "true"
            - name: GMAIL_ENABLED
              value: "false"
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: ope-db
                  key: postgres-dsn
            - name: REDIS_URL
              value: redis://redis.ope.svc.cluster.local:6379/0
          ports:
            - containerPort: 8080
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1Gi
          volumeMounts:
            - name: ope-uploads
              mountPath: /data/ope/uploads
      volumes:
        - name: ope-uploads
          persistentVolumeClaim:
            claimName: ope-uploads
---
apiVersion: v1
kind: Service
metadata:
  name: ope-core
  namespace: ope
spec:
  type: NodePort
  selector:
    app: ope-core
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ope-uploads
  namespace: ope
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
