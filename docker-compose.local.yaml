services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ope
      POSTGRES_PASSWORD: ope-local-dev
      POSTGRES_DB: ope
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ope -d ope"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    command: ["--config", "/app/config.yaml", "--host", "0.0.0.0", "--port", "4000"]
    env_file:
      - .env
    ports:
      - "4000:4000"
    volumes:
      - ./policies/litellm-config.yaml:/app/config.yaml:ro

  ope-core:
    build: .
    env_file:
      - .env
    environment:
      OPE_ENV: local
      LITELLM_BASE_URL: http://litellm:4000
      POSTGRES_DSN: postgresql://ope:ope-local-dev@postgres:5432/ope
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm:
        condition: service_started

volumes:
  postgres-data:

