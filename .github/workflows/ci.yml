name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Validate YAML
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          paths = [
              "docker-compose.local.yaml",
              "k8s/litellm.yaml",
              "k8s/ope-core.yaml",
              "k8s/tool-runner.yaml",
              "k8s/postgres.yaml",
              "k8s/redis.yaml",
              "k8s/namespace.yaml",
              "k8s/secrets.example.yaml",
              "policies/litellm-config.yaml",
              "policies/routing-policy.yaml",
              "policies/approval-policy.yaml",
              ".github/workflows/octo-ope-deploy.yml",
              ".github/workflows/octo-ope-diagnostics.yml",
              ".github/workflows/ci.yml",
              ".github/workflows/image.yml",
          ]
          for path in paths:
              docs = list(yaml.safe_load_all(Path(path).read_text(encoding="utf-8")))
              assert docs, path
              print(f"{path}: {len(docs)} document(s)")
          PY

  docker-build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ghcr.io/dronewukong/ope-core:ci
